---
- name: Add Loopback30 to R3 and advertise into OSPF
  hosts: R3
  gather_facts: no

  tasks:
    - name: Configure Loopback30
      cisco.ios.ios_config:
        lines:
          - ip address 10.30.30.30 255.255.255.255
        parents: interface Loopback30

    - name: Advertise loopback into OSPF
      cisco.ios.ios_config:
        lines:
          - network 10.30.30.30 0.0.0.0 area 10
        parents: router ospf 1

    - name: Save config
      cisco.ios.ios_config:
        save_when: modified